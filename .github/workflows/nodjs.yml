# .github/workflows/run-nginx.yml
name: Run my custome command on remote host

on:
  push:
    branches: ["main"]

jobs:
  run-docker:
    runs-on: self-hosted
    steps:
      - name: Remove old container if exists
        run: sudo docker rm -f nginx-test || true
      - name: Run Nginx container
        run: sudo docker run -d --name nginx-test -p 8080:80 nginx